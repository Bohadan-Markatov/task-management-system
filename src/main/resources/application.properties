spring.application.name=task-management

#Remove the code below if you don't want to use Docker
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=
spring.datasource.password=
spring.datasource.username=
spring.jpa.database=mysql
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
#Remove the code above if you don't want to use Docker

#If you are using Docker, paste the .env file (linked to in the README.md file)
#into the root directory of the project.
#If using H2, insert the values from the .env file into the empty fields

jwt.expiration=
jwt.secret=

app.mail=
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

spring.security.oauth2.client.registration.google.client-id=
spring.security.oauth2.client.registration.google.client-secret=

dropbox.refresh.token=
dropbox.app.key=
dropbox.app.secret=

