databaseChangeLog:
  - changeSet:
      id: create-project-table
      author: Bohdan
      changes:
        - createTable:
            tableName: attachments
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: task_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: dropboxFileId
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: fileName
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: uploadDate
                  type: TIMESTAMP
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: attachments
            baseColumnNames: task_id
            constraintName: FK_attachments_task
            referencedTableName: tasks
            referencedColumnNames: id